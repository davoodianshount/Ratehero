name: Setup Bolt Infra (one-time)

# Creates the D1 database and KV namespace Bolt needs, then commits the
# generated IDs into bolt-proxy/wrangler.jsonc and bolt-admin/wrangler.jsonc.
# Idempotent — safe to re-run. If the resources already exist it just reuses
# the IDs.
#
# Run manually: Actions → "Setup Bolt Infra (one-time)" → Run workflow
# (select the branch that holds the bolt-admin code).

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Resolve or create D1 database (bolt-data)
        id: d1
        shell: bash
        run: |
          set +e
          UUID_RE='[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'

          echo "— Looking for existing D1 database 'bolt-data'…"
          LIST_OUT=$(wrangler d1 list 2>&1)
          echo "$LIST_OUT"
          DB_ID=$(echo "$LIST_OUT" | grep -E 'bolt-data' | grep -oE "$UUID_RE" | head -1)

          if [ -z "$DB_ID" ]; then
            echo "— Not found. Creating D1 database 'bolt-data'…"
            CREATE_OUT=$(wrangler d1 create bolt-data 2>&1)
            echo "$CREATE_OUT"
            DB_ID=$(echo "$CREATE_OUT" | grep -oE "$UUID_RE" | head -1)
          else
            echo "— Reusing existing D1 database (id=$DB_ID)"
          fi

          if [ -z "$DB_ID" ]; then
            echo "❌ Could not determine D1 database ID." >&2
            exit 1
          fi
          echo "db_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "✔ D1 bolt-data = $DB_ID"

      - name: Resolve or create KV namespace (BOLT_CONFIG)
        id: kv
        shell: bash
        run: |
          set +e
          HEX32_RE='[a-f0-9]{32}'

          echo "— Looking for existing KV namespace 'BOLT_CONFIG'…"
          LIST_OUT=$(wrangler kv namespace list 2>&1)
          echo "$LIST_OUT"

          # Output might be JSON or a text table — try JSON first.
          KV_ID=$(echo "$LIST_OUT" | node -e '
            let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{
              try {
                const a = JSON.parse(d);
                if (Array.isArray(a)) {
                  const m = a.find(x => x.title && /BOLT_CONFIG/i.test(x.title));
                  if (m && m.id) { process.stdout.write(m.id); return; }
                }
              } catch(e) {}
              process.stdout.write("");
            });
          ' 2>/dev/null)

          if [ -z "$KV_ID" ]; then
            KV_ID=$(echo "$LIST_OUT" | grep -E 'BOLT_CONFIG' | grep -oE "$HEX32_RE" | head -1)
          fi

          if [ -z "$KV_ID" ]; then
            echo "— Not found. Creating KV namespace 'BOLT_CONFIG'…"
            CREATE_OUT=$(wrangler kv namespace create BOLT_CONFIG 2>&1)
            echo "$CREATE_OUT"
            KV_ID=$(echo "$CREATE_OUT" | grep -oE "$HEX32_RE" | head -1)
          else
            echo "— Reusing existing KV namespace (id=$KV_ID)"
          fi

          if [ -z "$KV_ID" ]; then
            echo "❌ Could not determine KV namespace ID." >&2
            exit 1
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          echo "✔ KV BOLT_CONFIG = $KV_ID"

      - name: Patch wrangler.jsonc files with IDs
        env:
          DB_ID: ${{ steps.d1.outputs.db_id }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
        run: |
          node -e '
            const fs = require("fs");
            for (const p of ["bolt-proxy/wrangler.jsonc","bolt-admin/wrangler.jsonc"]) {
              if (!fs.existsSync(p)) { console.log("skip (missing):", p); continue; }
              let s = fs.readFileSync(p,"utf8");
              s = s.replace(/"database_id":\s*"[^"]*"/g, `"database_id": "${process.env.DB_ID}"`);
              s = s.replace(/("kv_namespaces":\s*\[\s*\{[^}]*"binding":\s*"BOLT_CONFIG"[^}]*"id":\s*)"[^"]*"/s,
                            `$1"${process.env.KV_ID}"`);
              fs.writeFileSync(p,s);
              console.log("patched:", p);
            }
          '

      - name: Run D1 schema migration
        run: |
          if [ -f bolt-proxy/schema.sql ]; then
            wrangler d1 execute bolt-data --remote --file=bolt-proxy/schema.sql
          else
            echo "No schema.sql on this branch — skipping migration. Deploys on the bolt-admin branch will migrate."
          fi

      - name: Commit patched configs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bolt-proxy/wrangler.jsonc bolt-admin/wrangler.jsonc 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Wire D1 (${{ steps.d1.outputs.db_id }}) and KV (${{ steps.kv.outputs.kv_id }}) bindings into Bolt workers"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Summary
        run: |
          echo "=== Bolt infra ready ==="
          echo "D1 bolt-data  : ${{ steps.d1.outputs.db_id }}"
          echo "KV BOLT_CONFIG: ${{ steps.kv.outputs.kv_id }}"
