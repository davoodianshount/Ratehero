name: Deploy bolt-proxy Worker

on:
  push:
    branches:
      - main
      - claude/deploy-cloudflare-site-Wq2k6
      - claude/bolt-admin-v1
    paths:
      - 'bolt-proxy/**'
      - '.github/workflows/deploy-bolt-proxy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@4

      # Uploads the Anthropic API key as a Worker secret.
      # Idempotent — safe to run every deploy.
      - name: Set ANTHROPIC_API_KEY secret
        working-directory: bolt-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          printf '%s' "$ANTHROPIC_API_KEY" | wrangler secret put ANTHROPIC_API_KEY

      # Apply schema (CREATE TABLE IF NOT EXISTS — idempotent).
      # Only runs if the D1 binding is wired up (post-setup).
      - name: Migrate D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if grep -q 'REPLACE_AT_DEPLOY' bolt-proxy/wrangler.jsonc; then
            echo "⚠  D1 not yet set up — run the 'Setup Bolt Infra' workflow first. Skipping migration."
          else
            wrangler d1 execute bolt-data --remote --file=bolt-proxy/schema.sql
          fi

      - name: Deploy Worker
        working-directory: bolt-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if grep -q 'REPLACE_AT_DEPLOY' wrangler.jsonc; then
            echo "❌ D1/KV IDs not populated in bolt-proxy/wrangler.jsonc."
            echo "   Run the 'Setup Bolt Infra (one-time)' workflow first."
            exit 1
          fi
          wrangler deploy 2>&1 | tee deploy.log
          echo ""
          echo "=== Deployed URL ==="
          grep -Eo 'https://bolt-proxy\.[a-z0-9._-]+\.workers\.dev' deploy.log | head -1 || true
